<h2><u>Discours à Madame de La Sablière (v. 29-115) – IX-19 - p. 297</h2></u>

<h2>Introduction</h2>
<p>Comme La Fontaine le rappelle dans la dédicace du premier recueil au dauphin, il ajoute dans la préface qu'elles ne sont pas seulement morales mais donnent d'autres connaissances. Les propriétés des animaux et leurs divers caractères sont exprimés, en outre dans le deuxième recueil il va diversifier ses sujets ainsi que présume l'avertissement en s'abordant vos problèmes philosophiques.</p>

<p>En récusant la thèse cartésienne comment La Fontaine va-t-il nous convaincre, nous instruire et nous plaire ?</p>

<h2>I. La thèse cartésienne</h2>

<h3>L'art des transitions</h3>
<p>La Fontaine donne d'abord la parole en tenant de la philosophie. « Ils disent donc » (v. 29) « selon eux » (v. 45). Descartes va plus loin (v. 65) et propose une conclusion plausible pour Madame de La Sablière (v. 67-68). Le « cependant » ouvert v. 68 amorce résolument la deuxième partie de l'exposé par une série de contre-exemples (Le Cerf, La Perdrix, Le Castor) « qui détruisent chacune à leur façon la théorie des animaux-machines ». La Fontaine a initié cette réfutation à l'hémistiche d'un alexandrin et non au vers suivant éventuellement avec un changement de mètre > transition discrète révélatrice d'un art consommé et ligature harmonieuse où on voit la poésie au service de la logique.</p>

<h3>La pensée par analogie</h3>
<p>La démonstration des partisans de Descartes s'appuie sur une comparaison entre les animaux dits « machine » (v. 30) > 1° métaphore et une « montre » (v. 33) > symbole même de la machine entendue comme mécanique entièrement automatisée > analogie renforcée par symétrie « telle est la montre » (v. 33) « la bête est toute telle » (v. 39) qui se poursuit avec l'identité des enchaînements mécaniques « la première y met la seconde une troisième suit elle sonne la fin » (v. 37-38) engrenage de la roue « l'objet la frappe » (v. 40) « l'impression se fait » (v. 44) engage la situation dans les deux cas. La passivité et l'absence de liberté sont soulignées par la répétition de la préposition « sans » (v. 31-34-46). L'argument des cartésiens est fondé sur une fiction : la fable, la montre alors que La Fontaine parle le langage de la réalité de la vérité d'expérience.</p>

<h3>Les jeux sur l'énonciation</h3>
<p>La Fontaine prête une voix à différentes instances. Au début La Fontaine n'est que rapporteur « ils disent donc » (v. 29-30). À partir de « l'objet la frappe » (v. 40), les Cartésiens deviennent sujets « selon nous » (v. 42). Cependant il faut supporter un nouvel énonciateur s'interrogeant vers 44. Cette question ne peut être posée que par Madame de La Sablière, qui est donc pas seulement dédicataire, mais aussi un personnage mis en scène par La Fontaine, questionnant les uns les autres sous forme de stichomythie. Au vers suivant La Fontaine reprend la parole en répétant « selon eux » (vers 45) > son discours se poursuit jusqu'au vers 52. Alternance des différents protagonistes dans ce débat qui prend allure d’une comédie culminant avec l'entrée en scène de Descartes au vers 47. Aux vers 59-60, Descartes accède à la parole après une fausse éloge « Descartes mort-elle » (vers 54-64) pour une parodie du fameux <em>cogito ergo sum</em> (vers 60-64). 4 occurrences du mot « passer » > une scène de théâtre, une comédie à quatre voix où la thèse des Cartésiens est minée par l'humour et le tas de la comédie par lequel La Fontaine se moque d'une pareille démonstration, (des animaux-machines devenus animaux-montres) ne peut être sérieuse.</p>

<h2>II. La thèse de La Fontaine</h2>

<h3>L'énumération de trois exemples</h3>
<p>Dans les trois cas l'instinct de conservation s'allie à des comportements les plus dignes des plus grandes qualités humaines. Ruse et raisonnement pour le propre salut du cerf. Astuce et dévouement pour le salut des siens : il s'agit de la perdrix. Entraide et organisation sociale dans le monde des castors. Gradation numérique entre ces trois exemples, le cerf et la perdrix apportent un démenti au vers 37 « nulle sentiment » > perdrix > point d'âme (l'âme au XVII<sup>e</sup> siècle = esprit). Les castors sont une réponse ironique à l'affirmation de Descartes pourquoi quand « la bête penserait / la bête ne réfléchirait » (v. 61-64) > le cerf et la perdrix répondent aux cartésiens de la première partie du texte et l'exemple le plus long. Les castors défilent inspirateurs suprême de cette nouvelle philosophie de Descartes lui-même.</p>

<h3>La prise de position de La Fontaine</h3>

<p>La Fontaine refuse la thèse cartésienne des animaux-machines (pur automatisme, absence d’âme, absence de pensée). Il oppose à cette vision réductionniste une observation empirique et admirative des comportements animaux.</p>

<p>Il admire l’instinct animal qui produit des actes complexes, rusés, dévoués, organisés → loin d’être de simples « ressorts » ou « impressions » mécaniques (comme la montre de Descartes).</p>

<p>Les castors incarnent l’ironie maximale : leur société (édifice résistant, lits de bois puis de mortier, tâche commune, rôle des vieux) ressemble à une république humaine, avec entraide, prévoyance et ingéniosité → <strong>comment y voir seulement une machine sans âme ?</strong></p>

<p>Il introduit une pudeur et une discrétion poétique (v. 90-91) : le poète n’impose pas brutalement sa thèse, mais laisse les exemples parler, contre le projet rigide et dogmatique des cartésiens.</p>

<h3>Retour aux v. 22-23 : l’image de l’abeille</h3>

<p>Il faut revenir à l’image de l’abeille (symbole récurrent chez La Fontaine).</p>

<p>La figure de l’abeille est contraire à celle qui « dansable » (désordonnée ?) : ici, quelle est celle qui change les fleurs en miel pour avoir la douceur du plaisir ; les fleurs sans éclat deviennent, par son travail, source de miel (transformation intelligente et créative).</p>

<p>Comparaison avec les fleurs des « aventureuses déclarations de Cambridge » (allusion aux cartésiens anglais ou scolastiques ?) : les abeilles transforment le banal en précieux, contrairement à une mécanique qui répète sans inventer.</p>

<p>L’abeille symbolise l’instinct créateur, la conscience non réflexive mais efficace → les animaux ne réfléchissent pas comme l’homme, mais ils agissent avec une finalité intelligente.</p>

<h3><u>Conclusion de la prise de position</h3></u>

<p>La Fontaine conclut que les animaux ne représentent pas seulement l’homme (allégorie morale classique), mais constituent un sujet autonome dans toutes les métamorphoses.</p>

<p>Les animaux servent à montrer les mécanismes du corps (instinct, organisation) déformés par la philosophie mécaniste.</p>

<p>Les castors → <em>stratégie du castor philosophique</em> : ils ridiculisent subtilement Descartes en montrant une société animale plus « raisonnable » que bien des humains.</p>

<p>Ainsi, La Fontaine défend une vision <strong>vitaliste et empirique</strong> : admiration pour la nature vivante contre la réduction froide des « bêtes-montres ». Le poète maîtrise son œuvre intentionnellement, dispense sa philosophie avec légèreté et conclut dans son aveu final (v. 114) que l’observation humble l’emporte sur les systèmes abstraits.</p>

// ── Horloge ────────────────────────────────────────────────
function getSem(d) {
  const dt = new Date(Date.UTC(d.getFullYear(), d.getMonth(), d.getDate()));
  const day = dt.getUTCDay() || 7;
  dt.setUTCDate(dt.getUTCDate() + 4 - day);
  const y = new Date(Date.UTC(dt.getUTCFullYear(), 0, 1));
  return Math.ceil((((dt - y) / 86400000) + 1) / 7);
}

function tick() {
  const d = new Date();
  document.getElementById('clock').textContent =
    String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
  const jours = ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'];
  const mois  = ['janvier','février','mars','avril','mai','juin','juillet','août',
                  'septembre','octobre','novembre','décembre'];
  document.getElementById('jour').textContent = jours[d.getDay()];
  document.getElementById('date-complet').textContent =
    d.getDate() + ' ' + mois[d.getMonth()] + ' ' + d.getFullYear();
  const n = getSem(d);
  const s = n % 2 === 0 ? 'A' : 'B'; // sem.paire=A, sem.impaire=B (ex: sem.12=A, sem.13=B)
  const b = document.getElementById('sem-b');
  document.getElementById('sem-n').textContent = 'n°' + n;
  b.textContent = s;
  b.style.background = s === 'A' ? 'rgba(79,142,247,.2)' : 'rgba(62,207,142,.2)';
  b.style.color       = s === 'A' ? '#4f8ef7'             : '#3ecf8e';
}

// ── Rendu liste ────────────────────────────────────────────
function render() {
  const c = document.getElementById('seq-list');
  c.innerHTML = '';
  SEQUENCES.forEach((seq, si) => {
    seq.parties.forEach((p, pi) => {
      const div = document.createElement('div');
      div.className = 'seq-card';
      div.innerHTML = `
        <div class="seq-num">${si+1}.${pi+1}</div>
        <div class="seq-info">
          <div class="seq-titre">${p.titre}</div>
          <div class="seq-sous">${seq.titre}</div>
        </div>
        <div class="seq-arrow">→</div>`;
      div.onclick = () => ouvrir(si, pi);
      c.appendChild(div);
    });
  });
  c.classList.remove('stagger');
  void c.offsetWidth;
  c.classList.add('stagger');
}

function ouvrir(si, pi) {
  const seq = SEQUENCES[si], p = seq.parties[pi];
  document.getElementById('cours-titre').textContent = p.titre;
  document.getElementById('cours-meta').textContent  = '🇫🇷 Français · ' + seq.titre;
  document.getElementById('cours-contenu').innerHTML = p.contenu;
  document.getElementById('page-liste').classList.remove('active');
  document.getElementById('page-cours').classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

function retour() {
  document.getElementById('page-cours').classList.remove('active');
  document.getElementById('page-liste').classList.add('active');
  window.scrollTo({top:0, behavior:'smooth'});
}

document.addEventListener('DOMContentLoaded', () => {
  tick();
  setInterval(tick, 10000);
  render();
});
